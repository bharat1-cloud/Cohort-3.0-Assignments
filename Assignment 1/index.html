<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">

  <title>Pikachu UI</title>
</head>

<body>

  <div class="container">

    <!-- Left Section -->
    <div class="left-section">

      <!-- Pokemon Logo -->
      <img
        class="pokemon-logo"
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg"
        alt="Pokemon Logo"
      >

      <!-- Content -->
      <div class="content">

        <p class="small-heading">POKEMON GEN I</p>

        <h1>Pikachu</h1>

        <p class="description">
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by
          yellow fur.
        </p>

        <div class="slide-number">
          <span class="line"></span>
          <p>01 / 08</p>
        </div>

      </div>

      <!-- Pokeball -->
      <div class="pokeball"></div>

    </div>

    <!-- Right Section -->
    <div class="right-section"></div>

    <!-- Pikachu Image -->
    <img
      class="pikachu-image"
      src="./pngwing.com.webp"
      alt="Pikachu"
    >

    <!-- Menu -->
    <div class="menu">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Right Dots -->
    <div class="dots">
      <span class="active"></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

</body>
</html>
